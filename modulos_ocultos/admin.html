<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - DELCO II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .dashboard-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
        }

        .btn-logout {
            background-color: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-logout:hover {
            background-color: var(--danger-color);
            color: white;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-field,
        .select-field {
            width: 100%;
            padding: 10px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-family: 'Roboto', sans-serif;
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .status-inactive {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--danger-color);
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary-color);
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* Modal Mensajes */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 2.5rem 2rem 2rem 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            font-size: 2rem;
            color: #ef4444;
            line-height: 1;
            transition: color 0.2s;
            z-index: 100;
        }

        .close-btn:hover {
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-header">
        <h1 class="dashboard-title">Panel de Administración - DELCO II</h1>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <button class="btn-submit" style="margin: 0; background-color: #fbbf24; color: #1e1e1e;"
                onclick="abrirModalMensaje()">
                ✉️ Enviar Mensaje
            </button>
            <button class="btn-submit"
                style="margin: 0; background-color: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color); width: auto; padding: 0.5rem 1rem;"
                onclick="abrirModalConfig()">
                ⚙️
            </button>
            <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
        </div>
    </div>

    <div class="grid-container">
        <!-- Panel Formulario -->
        <div class="panel">
            <h2 class="panel-title">Registrar / Actualizar Vecino</h2>
            <form id="registroForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombre" class="input-field" required>
                </div>
                <div class="form-group">
                    <label>Número de Lote</label>
                    <input type="text" id="lote" class="input-field" required>
                </div>
                <div class="form-group">
                    <label>DPI</label>
                    <input type="text" id="dpi" class="input-field" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="text" id="telefono" class="input-field">
                </div>
                <div class="form-group">
                    <label>Estado de Pago</label>
                    <select id="status" class="select-field">
                        <option value="1">Pagos al Día (Verde)</option>
                        <option value="0">No ha pagado (Rojo)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Días de Demora</label>
                    <input type="number" id="dias_demora" class="input-field" value="0" min="0" required>
                </div>
                <div class="form-group">
                    <label>Código de Vecino (Generado)</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="codigo" class="input-field" placeholder="Ej. XY1234" required>
                        <button type="button" class="btn-submit" style="margin-top: 0; width: auto; padding: 0 15px;"
                            onclick="generarCodigoNuevo()">Generar</button>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-submit">Guardar Registro</button>
                </div>
            </form>
        </div>
        <!-- Panel Tabla -->
        <div class="panel">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px;">
                <h2 class="panel-title" style="margin-bottom: 0;">Directorio de Vecinos</h2>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="busquedaInput" class="input-field" placeholder="Buscar por Nombre o Tel..."
                        style="padding: 8px; width: 220px;">
                    <button type="button" class="btn-submit" style="margin-top: 0; padding: 8px 15px; width: auto;"
                        onclick="renderizarTabla()">Buscar</button>
                    <button type="button" class="btn-submit"
                        style="margin-top: 0; padding: 8px 15px; width: auto; background-color: var(--border-color);"
                        onclick="limpiarBusqueda()" title="Borrar texto del buscador">Limpiar Filtro</button>
                    <button type="button" class="btn-submit"
                        style="margin-top: 0; padding: 8px 15px; width: auto; background-color: var(--success-color);"
                        onclick="window.open('../visitas.html', '_blank')">Visitas</button>
                    <button type="button" class="btn-submit"
                        style="margin-top: 0; padding: 8px 15px; width: auto; background-color: var(--danger-color);"
                        onclick="limpiarBaseDeDatos()" title="Eliminar todos los vecinos permanentemente">⚠️ Limpiar
                        BD</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table id="tablaVecinos">
                    <thead>
                        <tr>
                            <th>Lote</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>DPI</th>
                            <th>Teléfono</th>
                            <th>Estatus</th>
                            <th>Demora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaBody">
                        <!-- Datos cargados dinámicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal para Configuración -->
    <div id="modalConfig" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModalConfig()">&times;</span>
            <h2 class="panel-title" style="margin-bottom: 1rem;">Configuración del Condominio</h2>
            <form id="configForm">
                <div class="form-group">
                    <label>Nombre del Condominio</label>
                    <input type="text" id="configNombre" class="input-field" placeholder="Ej. DELCO II" required>
                </div>
                <div class="form-group">
                    <label>Nombre para Marbete</label>
                    <input type="text" id="configNombreMarbete" class="input-field" placeholder="Opción Corta Ej. DELCO"
                        required>
                </div>
                <div class="form-group">
                    <label>Logotipo (URL de imagen)</label>
                    <input type="url" id="configLogo" class="input-field" placeholder="https://ejemplo.com/logo.png">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico (Junta Directiva)</label>
                    <input type="email" id="configCorreo" class="input-field" placeholder="junta@condominio.com">
                </div>
                <div class="form-group">
                    <label>Teléfono (Junta Directiva)</label>
                    <input type="text" id="configTelefono" class="input-field" placeholder="Ej. 1234-5678">
                </div>

                <hr style="border-top: 1px solid var(--border-color); margin: 1.5rem 0;">
                <h3 style="color: var(--text-main); font-size: 1.1rem; margin-bottom: 1rem;">Seguridad</h3>

                <div class="form-group">
                    <label>Cambiar Contraseña (Usuario: DIRECTIVA)</label>
                    <input type="password" id="configPassword" class="input-field"
                        placeholder="Dejar en blanco para conservar actual">
                </div>

                <button type="submit" class="btn-submit"
                    style="background-color: var(--primary-color); margin-top: 1.5rem;">Guardar
                    Configuración</button>
            </form>
        </div>
    </div>

    <!-- Modal para Enviar Mensajes -->
    <div id="modalMensaje" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModalMensaje()">&times;</span>
            <h2 class="panel-title" style="margin-bottom: 1rem;">Módulo de Comunicados</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Envíe alertas o mensajes a la
                comunidad de vecinos.</p>

            <form id="mensajeForm">
                <div class="form-group"
                    style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px;">
                    <input type="checkbox" id="enviarATodos" onchange="toggleDestinatarios()" checked
                        style="width: 18px; transform: scale(1.2);">
                    <label for="enviarATodos" style="margin: 0; color: white; font-weight: 600; cursor: pointer;">Enviar
                        a TODOS LOS VECINOS</label>
                </div>

                <div class="form-group" id="destinatarioGroup" style="display: none;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Seleccionar Vecino Específico</label>
                        <button type="button" onclick="toggleBuscadorVecinos()"
                            style="background: none; border: none; color: var(--primary-color); cursor: pointer; font-size: 0.85rem; text-decoration: underline; font-weight: 600;">🔍
                            Buscar</button>
                    </div>

                    <div id="buscadorVecinosDiv" style="display: none; margin-bottom: 10px;">
                        <input type="text" id="inputBusquedaVecinoMsj" class="input-field"
                            placeholder="Buscar por Nombre, ID o Tel..." style="padding: 8px; font-size: 0.9rem;"
                            onkeyup="filtrarVecinosMensaje()">
                    </div>

                    <select id="destinatario" class="select-field">
                        <!-- Opciones dinámicas pobladas por JS -->
                    </select>
                </div>

                <div class="form-group">
                    <label>Asunto / Título</label>
                    <input type="text" id="asuntoMensaje" class="input-field"
                        placeholder="Ej. Aviso de Mantenimiento..." required>
                </div>

                <div class="form-group">
                    <label>Mensaje Completo</label>
                    <textarea id="cuerpoMensaje" class="input-field" rows="5" placeholder="Escriba su mensaje aquí..."
                        required style="resize: vertical; font-family: inherit;"></textarea>
                </div>

                <div class="form-group"
                    style="display: flex; align-items: center; gap: 10px; background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 6px; border: 1px dashed #10b981; margin-top: 15px; margin-bottom: 20px;">
                    <input type="checkbox" id="enviarPorWhatsapp" checked style="width: 18px; transform: scale(1.2);">
                    <label for="enviarPorWhatsapp"
                        style="margin: 0; color: #10b981; font-weight: 600; cursor: pointer;">📲 Abrir Aplicación de
                        WhatsApp al Enviar</label>
                </div>

                <button type="submit" class="btn-submit" style="background-color: #10b981; font-size: 1.1rem;">Enviar
                    Mensaje 🚀</button>
            </form>
        </div>
    </div>

    <script>
        // SEGURIDAD: Verificar si inició sesión, de lo contrario echarlo al login
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = '../login.html';
        }

        function cerrarSesion() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = '../login.html';
        }

        // Usar LocalStorage para que los datos persistan en el navegador
        let vecinos_db = JSON.parse(localStorage.getItem('delco_vecinos')) || [
            { id: 1, nombre: 'NATAN RODAS', lote: '30', dpi: '2317', telefono: '31001708', status: 1, dias_demora: 0, codigo: 'NR2317' },
            { id: 2, nombre: 'ALVARO TRUJILLO', lote: '60', dpi: '1234', telefono: '55456655', status: 0, dias_demora: 30, codigo: 'AT1234' },
            { id: 3, nombre: 'WILLIAM ARREAGA', lote: '90', dpi: '77766', telefono: '88877788', status: 1, dias_demora: 0, codigo: 'WA7766' }
        ];

        let editandoId = null;

        function guardarDatosLocal() {
            localStorage.setItem('delco_vecinos', JSON.stringify(vecinos_db));
        }

        function generarCodigoNuevo() {
            // Generar 2 letras al azar
            const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let dosLetras = "";
            for (let i = 0; i < 2; i++) {
                dosLetras += letras.charAt(Math.floor(Math.random() * letras.length));
            }

            // Generar los 4 últimos números aleatorios
            // o tomar de otro lado si prefieres, aquí creamos 4 dígitos fijos (1000 - 9999)
            let cuatroNumeros = Math.floor(1000 + Math.random() * 9000).toString();

            document.getElementById('codigo').value = dosLetras + cuatroNumeros;
        }

        function abrirMarbeteVecino(codigo, nombre) {
            if (!codigo) {
                alert(`El vecino ${nombre} no tiene un código generado todavía. Modifíquelo para agregar uno.`);
                return;
            }
            // Abrir el marbete en una ventana nueva
            window.open(`../marbete.html?codigo=${encodeURIComponent(codigo)}`, '_blank');
        }

        function limpiarBusqueda() {
            if (document.getElementById('busquedaInput')) {
                document.getElementById('busquedaInput').value = '';
            }
            renderizarTabla();
        }

        function limpiarBaseDeDatos() {
            // Verificar contraseña de administrador (DIRECTIVA)
            const claveIngresada = prompt("⚠️ ATENCIÓN ⚠️\nEstá a punto de ELIMINAR TODOS los vecinos de la base de datos de este dispositivo.\n\nPara confirmar, ingrese la clave administrativa (DIRECTIVA):");

            if (claveIngresada === null) return; // Cancelado

            let usuarios_db = JSON.parse(localStorage.getItem('delco_usuarios')) || [];
            let adminDirectiva = usuarios_db.find(u => u.username === 'DIRECTIVA');

            // Revisa si la clave escrita coincide con la real
            if (adminDirectiva && claveIngresada === adminDirectiva.password_hash) {
                // Proceder a formatear
                if (confirm("Clave correcta. ¿Está 100% seguro de que desea VACIAR el directorio de forma permanente?\nEsta acción no se puede deshacer.")) {
                    vecinos_db = []; // Vaciar el arreglo en RAM
                    guardarDatosLocal(); // Guardar el arreglo vacío en LocalStorage
                    renderizarTabla();   // Refrescar la tabla
                    alert("✅ Base de datos vaciada exitosamente.");
                }
            } else {
                alert("❌ Clave administrativa incorrecta. Acción bloqueada.");
            }
        }

        function renderizarTabla() {
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';

            const busquedaInput = document.getElementById('busquedaInput');
            const textoBusqueda = busquedaInput ? busquedaInput.value.toLowerCase().trim() : '';

            const vecinosFiltro = vecinos_db.filter(v => {
                if (!textoBusqueda) return true;
                return (v.nombre.toLowerCase().includes(textoBusqueda) ||
                    (v.telefono && v.telefono.includes(textoBusqueda)));
            });

            vecinosFiltro.forEach(vecino => {
                const tr = document.createElement('tr');

                const statusHtml = vecino.status === 1
                    ? '<span class="status-badge status-active">AL DÍA</span>'
                    : '<span class="status-badge status-inactive">MOROSO</span>';

                tr.innerHTML = `
                    <td><strong>${vecino.lote}</strong></td>
                    <td>${vecino.nombre}</td>
                    <td><span style="color: var(--primary-color); font-weight: 600; letter-spacing: 1px;">${vecino.codigo || '-'}</span></td>
                    <td>${vecino.dpi}</td>
                    <td>
                        <input type="text" value="${vecino.telefono || ''}" class="input-field" 
                            style="padding: 6px; width: 120px; font-size: 0.9rem; background-color: rgba(0,0,0,0.2); border: 1px solid var(--border-color); text-align: center;" 
                            placeholder="Sin Teléfono"
                            onchange="actualizarTelefonoLocal(${vecino.id}, this.value)">
                    </td>
                    <td>${statusHtml}</td>
                    <td style="color: var(--danger-color); font-weight: bold;">${vecino.dias_demora || 0} ds</td>
                    <td>
                        <button class="action-btn" onclick="editarVecino(${vecino.id})">Editar</button> | 
                        <button class="action-btn" style="color: var(--success-color);" onclick="abrirMarbeteVecino('${vecino.codigo || vecino.dpi}', '${vecino.nombre}')">Marbete</button> |
                        <button class="action-btn" style="color: var(--danger-color);" onclick="eliminarVecino(${vecino.id}, '${vecino.nombre}')" title="Eliminar Vecino">Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function actualizarTelefonoLocal(id, nuevoTelefono) {
            const index = vecinos_db.findIndex(v => v.id === id);
            if (index !== -1) {
                vecinos_db[index].telefono = nuevoTelefono.trim();
                guardarDatosLocal();
                // Reflejar cambios visualmente si se necesita, aunque el onchange ya lo hace
            }
        }

        function eliminarVecino(id, nombre) {
            if (confirm(`¿Estás seguro que deseas ELIMINAR permanentemente a ${nombre} de la base de datos?`)) {
                const index = vecinos_db.findIndex(v => v.id === id);
                if (index !== -1) {
                    vecinos_db.splice(index, 1);
                    guardarDatosLocal();
                    renderizarTabla();
                    alert(`Vecino ${nombre} eliminado exitosamente.`);
                }
            }
        }

        document.getElementById('registroForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const datosFormulario = {
                nombre: document.getElementById('nombre').value.toUpperCase(),
                lote: document.getElementById('lote').value,
                dpi: document.getElementById('dpi').value,
                telefono: document.getElementById('telefono').value,
                codigo: document.getElementById('codigo').value,
                status: parseInt(document.getElementById('status').value),
                dias_demora: parseInt(document.getElementById('dias_demora').value) || 0
            };

            if (editandoId) {
                // Actualizar registro existente
                const index = vecinos_db.findIndex(v => v.id === editandoId);
                if (index !== -1) {
                    vecinos_db[index] = { ...vecinos_db[index], ...datosFormulario };
                }
                alert("Vecino actualizado exitosamente.");
                editandoId = null;
            } else {
                // Crear nuevo registro
                const nuevoId = vecinos_db.length > 0 ? Math.max(...vecinos_db.map(v => v.id)) + 1 : 1;
                vecinos_db.push({ id: nuevoId, ...datosFormulario });
                alert("Vecino registrado exitosamente.");
            }

            guardarDatosLocal();
            renderizarTabla();
            this.reset();
        });

        function editarVecino(id) {
            const vecino = vecinos_db.find(v => v.id === id);
            if (vecino) {
                document.getElementById('nombre').value = vecino.nombre;
                document.getElementById('lote').value = vecino.lote;
                document.getElementById('dpi').value = vecino.dpi;
                document.getElementById('telefono').value = vecino.telefono || '';
                document.getElementById('codigo').value = vecino.codigo || '';
                document.getElementById('status').value = vecino.status;
                document.getElementById('dias_demora').value = vecino.dias_demora !== undefined ? vecino.dias_demora : 0;

                editandoId = id; // Indicar que estamos en modo edición
                alert(`Editando al vecino: ${vecino.nombre}. Modifique los datos y presione 'Guardar Registro'.`);
            }
        }

        // MÓDULO DE MENSAJERÍA
        let mensajes_db = JSON.parse(localStorage.getItem('delco_mensajes')) || [];

        function abrirModalMensaje() {
            document.getElementById('modalMensaje').style.display = 'flex';
            cargarVecinosMensaje();
            toggleDestinatarios();
        }

        function cerrarModalMensaje() {
            document.getElementById('modalMensaje').style.display = 'none';
        }

        function toggleDestinatarios() {
            const todos = document.getElementById('enviarATodos').checked;
            document.getElementById('destinatarioGroup').style.display = todos ? 'none' : 'block';
        }

        function cargarVecinosMensaje() {
            const select = document.getElementById('destinatario');
            select.innerHTML = '<option value="">-- Seleccione un vecino --</option>';
            // Ordenar vecinos alfabéticamente
            const vecinosOrdenados = [...vecinos_db].sort((a, b) => a.nombre.localeCompare(b.nombre));

            vecinosOrdenados.forEach(v => {
                select.innerHTML += `<option value="${v.id}" data-search="${(v.nombre + ' ' + v.lote + ' ' + v.dpi + ' ' + (v.telefono || '')).toLowerCase()}">Lote ${v.lote} - ${v.nombre}</option>`;
            });
        }

        function toggleBuscadorVecinos() {
            const buscadorDiv = document.getElementById('buscadorVecinosDiv');
            if (buscadorDiv.style.display === 'none') {
                buscadorDiv.style.display = 'block';
                document.getElementById('inputBusquedaVecinoMsj').focus();
            } else {
                buscadorDiv.style.display = 'none';
                document.getElementById('inputBusquedaVecinoMsj').value = '';
                filtrarVecinosMensaje(); // Restablecer select
            }
        }

        function filtrarVecinosMensaje() {
            const input = document.getElementById('inputBusquedaVecinoMsj').value.toLowerCase().trim();
            const select = document.getElementById('destinatario');
            const options = select.getElementsByTagName('option');

            let primeroVisible = false;

            for (let i = 1; i < options.length; i++) { // Evitar la opcion placeholder 0
                const searchData = options[i].getAttribute('data-search');
                if (searchData && searchData.includes(input)) {
                    options[i].style.display = '';
                    if (!primeroVisible && input !== '') {
                        select.selectedIndex = i; // Auto seleccionar el primero que coincida mientras escribe
                        primeroVisible = true;
                    }
                } else {
                    options[i].style.display = 'none';
                }
            }
            if (input === '') {
                select.selectedIndex = 0;
            }
        }

        document.getElementById('mensajeForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const enviarATodos = document.getElementById('enviarATodos').checked;
            const destinatarioId = document.getElementById('destinatario').value;
            const asunto = document.getElementById('asuntoMensaje').value.trim();
            const cuerpo = document.getElementById('cuerpoMensaje').value.trim();
            const usarWhatsapp = document.getElementById('enviarPorWhatsapp').checked;

            if (!enviarATodos && !destinatarioId) {
                alert("Debe seleccionar un vecino específico si desmarca la casilla de todos.");
                return;
            }

            const ahora = new Date();
            const fechaHora = ahora.toLocaleDateString('es-ES') + ' ' + ahora.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            const nuevoMensaje = {
                id: mensajes_db.length + 1,
                id_remitente: 1, // Simulando que el ID 1 es el Admin/Directiva
                id_destinatario: enviarATodos ? "TODOS" : parseInt(destinatarioId),
                asunto: asunto,
                cuerpo: cuerpo,
                fecha_envio: fechaHora,
                timestamp: ahora.getTime(),
                leido: 0
            };

            mensajes_db.push(nuevoMensaje);
            localStorage.setItem('delco_mensajes', JSON.stringify(mensajes_db));

            let msjAlerta = "Comunicado guardado en la plataforma interna exitosamente.";

            if (usarWhatsapp) {
                if (enviarATodos) {
                    // Prepara el texto universal
                    const textoWapp = encodeURIComponent(`📢 *${asunto}*\n\nEstimados vecinos,\n${cuerpo}\n\n_Atte. La Administración_`);
                    // Redirige al WhatsApp genérico para que elija los grupos o contactos (lista de difusión)
                    window.open(`https://api.whatsapp.com/send?text=${textoWapp}`, '_blank');
                    msjAlerta += "\n\nSe abrirá WhatsApp. Selecciona tu grupo de vecinos o tu lista de difusión para pegar este mensaje.";
                } else {
                    const vecino = vecinos_db.find(v => v.id == destinatarioId);
                    if (vecino && vecino.telefono) {
                        let telLimpio = vecino.telefono.replace(/\D/g, '');
                        // Si el teléfono tiene 8 dígitos, asume Guatemala y le pone 502. Sino, usa tal cual.
                        if (telLimpio.length === 8) telLimpio = '502' + telLimpio;

                        const textoWapp = encodeURIComponent(`📢 *${asunto}*\n\nHola ${vecino.nombre},\n${cuerpo}\n\n_Atte. La Administración_`);
                        window.open(`https://wa.me/${telLimpio}?text=${textoWapp}`, '_blank');
                        msjAlerta += `\n\nAbriendo chat de WhatsApp con ${vecino.nombre}...`;
                    } else {
                        msjAlerta += "\n\n⚠️ El vecino seleccionado no tiene un número de teléfono registrado, por lo que no se pudo abrir WhatsApp.";
                    }
                }
            }

            alert(msjAlerta);

            this.reset();
            cerrarModalMensaje();
        });

        // MÓDULO DE CONFIGURACIÓN
        let config_db = JSON.parse(localStorage.getItem('delco_config')) || {
            nombre: 'DELCO II',
            nombreMarbete: 'DELCO II',
            logo: '',
            correo: '',
            telefono: ''
        };

        function abrirModalConfig() {
            document.getElementById('modalConfig').style.display = 'flex';
        }

        function cerrarModalConfig() {
            document.getElementById('modalConfig').style.display = 'none';
        }

        function cargarConfiguracion() {
            document.getElementById('configNombre').value = config_db.nombre || '';
            document.getElementById('configNombreMarbete').value = config_db.nombreMarbete || config_db.nombre || '';
            document.getElementById('configLogo').value = config_db.logo || '';
            document.getElementById('configCorreo').value = config_db.correo || '';
            document.getElementById('configTelefono').value = config_db.telefono || '';
            document.getElementById('configPassword').value = ''; // limpiar siempre

            document.querySelector('.dashboard-title').innerText = `Panel de Administración - ${config_db.nombre}`;
            document.title = `Panel de Administración - ${config_db.nombre}`;
        }

        document.getElementById('configForm').addEventListener('submit', function (e) {
            e.preventDefault();
            config_db = {
                nombre: document.getElementById('configNombre').value.trim(),
                nombreMarbete: document.getElementById('configNombreMarbete').value.trim(),
                logo: document.getElementById('configLogo').value.trim(),
                correo: document.getElementById('configCorreo').value.trim(),
                telefono: document.getElementById('configTelefono').value.trim()
            };
            localStorage.setItem('delco_config', JSON.stringify(config_db));

            // Gestión de cambio de clave para el usuario DIRECTIVA
            const nuevaClave = document.getElementById('configPassword').value.trim();
            if (nuevaClave) {
                let usuarios_db = JSON.parse(localStorage.getItem('delco_usuarios')) || [];
                let indexDirectiva = usuarios_db.findIndex(u => u.username === 'DIRECTIVA');

                if (indexDirectiva !== -1) {
                    usuarios_db[indexDirectiva].password_hash = nuevaClave;
                    localStorage.setItem('delco_usuarios', JSON.stringify(usuarios_db));
                    alert(`Configuración guardada.\nContraseña de acceso para 'DIRECTIVA' actualizada con éxito a: ${nuevaClave}`);
                } else {
                    alert('Configuración guardada.\nNo se encontró el usuario DIRECTIVA en la base de datos para cambiar su clave.');
                }
            } else {
                alert('Configuración guardada exitosamente.');
            }

            cargarConfiguracion();
            cerrarModalConfig();
        });

        // Renderizar al cargar la página
        renderizarTabla();
        cargarConfiguracion();
    </script>
</body>

</html>
