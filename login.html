<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INICIO DE SESIÓN - Sistema VECINOS DELCO II</title>
    <!-- Integración de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS Nativo con diseño Premium equivalente a CustomTkinter Dark Mode -->
    <style>
        :root {
            --primary-color: #3b82f6;
            /* Blue 500 */
            --primary-hover: #2563eb;
            /* Blue 600 */
            --bg-color: #242424;
            /*CTk dark mode bg*/
            --panel-bg: #2b2b2b;
            /*CTk elevated bg*/
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --input-bg: #343638;
            /* CTk input bg */
            --input-border: #565b5e;
            /* CTk input border */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary-color);
        }

        .input-field::placeholder {
            color: #8b9298;
        }

        .btn-login {
            display: inline-block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
            display: none;
        }

        .signup-link {
            display: block;
            margin-top: 20px;
            color: #10b981;
            /* Emerald Green */
            font-weight: 600;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }

        .signup-link:hover {
            color: #34d399;
            /* Emerald Light */
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 2.5rem 2rem 2rem 2rem;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #3f3f3f;
            max-height: 85vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #ef4444;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 100;
        }

        .close-btn:hover {
            color: #ff6b6b;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3f3f3f;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1 class="title">INICIO DE SESIÓN</h1>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="input-field" placeholder="Usuario (o DPI)" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="input-field" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
            <div id="errorMsg" class="error-message">Usuario o clave incorrectos</div>

            <a onclick="abrirRegistro()" class="signup-link">¿No tienes cuenta? Registrar Nuevo Condominio</a>
        </form>
    </div>

    <!-- Modal Registro Nuevo Condominio -->
    <div id="modalRegistro" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarRegistro()">&times;</span>
            <h2 class="panel-title">Registrar Nuevo Condominio</h2>
            <form id="registroForm">
                <div class="form-group">
                    <input type="text" id="regNombre" class="input-field" placeholder="Nombre del Condominio" required>
                </div>
                <div class="form-group">
                    <input type="text" id="regPersona" class="input-field" placeholder="Nombre de Persona a Contactar"
                        required>
                </div>
                <div class="form-group">
                    <input type="text" id="regPais" class="input-field" placeholder="País" required>
                </div>
                <div class="form-group">
                    <input type="text" id="regTelefono" class="input-field" placeholder="Teléfono de Contacto" required>
                </div>
                <div class="form-group">
                    <input type="email" id="regCorreo" class="input-field" placeholder="Correo Electrónico" required>
                </div>

                <button type="submit" class="btn-login" style="background-color: #10b981;">Enviar Solicitud a
                    SISDEL</button>
            </form>
        </div>
    </div>

    <script>
        // Simulador de Base de Datos para el Login en el navegador
        // Usar localStorage para permitir cambios de contraseña
        let db_usuarios = JSON.parse(localStorage.getItem('delco_usuarios')) || [
            { username: 'DIRECTIVA', password_hash: 'M2026', rol_id: 1, nombre: 'Programador Principal' },
            { username: 'admin_delco', password_hash: 'clave_maestra_2026', rol_id: 1, nombre: 'Administrador' },
            { username: 'vecino30', password_hash: 'lote30', rol_id: 2, nombre: 'NATAN RODAS', status: 1, lote: '30' }
        ];

        // Parche de actualización: forzamos el cambio de clave si el navegador había guardado la clave anterior (CLAVEM2026)
        let dirUser = db_usuarios.find(u => u.username === 'DIRECTIVA');
        if (dirUser && dirUser.password_hash === 'CLAVEM2026') {
            dirUser.password_hash = 'M2026';
        }

        // Guardamos para que admin.html la pueda editar
        localStorage.setItem('delco_usuarios', JSON.stringify(db_usuarios));

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Validar acceso
            const usuarioValido = db_usuarios.find(u => u.username === user && u.password_hash === pass);

            if (usuarioValido) {
                errorMsg.style.display = 'none';

                // Redirigir según rol
                if (usuarioValido.rol_id === 1) {
                    // Es Directiva / Programador
                    localStorage.setItem('admin_logged_in', 'true');
                    window.location.href = 'modulos_ocultos/admin.html';
                } else {
                    // Es Vecino - Preparamos datos para la vista del Marbete/Status
                    alert(`¡Bienvenido, ${usuarioValido.nombre}! Abriendo Estatus...`);
                    // Al ser un prototipo web, podemos redirigir al marbete u otra pantalla
                    // window.location.href = 'estatus_vecino.html';
                }
            } else {
                // Mostrar error
                errorMsg.style.display = 'block';
            }
        });

        // Funciones para el Modal de Registro
        function abrirRegistro() {
            document.getElementById('modalRegistro').style.display = 'flex';
        }

        function cerrarRegistro() {
            document.getElementById('modalRegistro').style.display = 'none';
        }

        document.getElementById('registroForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const nombre = document.getElementById('regNombre').value.trim();
            const persona = document.getElementById('regPersona').value.trim();
            const pais = document.getElementById('regPais').value.trim();
            const telefono = document.getElementById('regTelefono').value.trim();
            const correo = document.getElementById('regCorreo').value.trim();

            // Construir el cuerpo del correo
            const asunto = encodeURIComponent(`Solicitud de Nuevo Condominio: ${nombre}`);
            let cuerpo = `Hola SISDEL,%0D%0A%0D%0ADeseo registrar un nuevo sistema para mi condominio. Mis datos son los siguientes:%0D%0A%0D%0A`;
            cuerpo += `- Nombre del Condominio: ${nombre}%0D%0A`;
            cuerpo += `- Persona de Contacto: ${persona}%0D%0A`;
            cuerpo += `- País: ${pais}%0D%0A`;
            cuerpo += `- Teléfono: ${telefono}%0D%0A`;
            cuerpo += `- Correo: ${correo}%0D%0A%0D%0A`;
            cuerpo += `Quedo a la espera de sus instrucciones.`;

            // Construir enlace mailto apuntando al correo de SISDEL
            const mailtoLink = `mailto:info@sisdel.com?subject=${asunto}&body=${cuerpo}`;

            // Abrir gestor de correo
            window.location.href = mailtoLink;

            // Cerrar el modal para volver al login y resetear el form
            cerrarRegistro();
            e.target.reset();
        });
    </script>
</body>

</html>
