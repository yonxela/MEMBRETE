<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INICIO DE SESIÓN - Sistema VECINOS DELCO II</title>
    <!-- Integración de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">

    <!-- CSS Nativo con diseño Premium equivalente a CustomTkinter Dark Mode -->
    <style>
        :root {
            --primary-color: #3b82f6;
            /* Blue 500 */
            --primary-hover: #2563eb;
            /* Blue 600 */
            --bg-color: #242424;
            /*CTk dark mode bg*/
            --panel-bg: #2b2b2b;
            /*CTk elevated bg*/
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --input-bg: #343638;
            /* CTk input bg */
            --input-border: #565b5e;
            /* CTk input border */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-family: 'Roboto', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--primary-color);
        }

        .input-field::placeholder {
            color: #8b9298;
        }

        .btn-login {
            display: inline-block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h1 class="title">INICIO DE SESIÓN</h1>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="username" class="input-field" placeholder="Usuario (o DPI)" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" class="input-field" placeholder="Contraseña" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
            <div id="errorMsg" class="error-message">Usuario o clave incorrectos</div>
        </form>
    </div>

    <script>
        // Simulador de Base de Datos para el Login en el navegador
        // Aquí están los usuarios que tenías en SQLite
        const db_usuarios = [
            { username: 'admin_delco', password_hash: 'clave_maestra_2026', rol_id: 1, nombre: 'Administrador' },
            { username: 'NIR', password_hash: 'M2026', rol_id: 1, nombre: 'Administrador NIR' },
            { username: 'sisdel', password_hash: 'm2026', rol_id: 1, nombre: 'Programador Principal' },
            { username: 'vecino30', password_hash: 'lote30', rol_id: 2, nombre: 'NATAN RODAS', status: 1, lote: '30' }
        ];

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Validar acceso
            const usuarioValido = db_usuarios.find(u => u.username === user && u.password_hash === pass);

            if (usuarioValido) {
                errorMsg.style.display = 'none';

                // Redirigir según rol
                if (usuarioValido.rol_id === 1) {
                    // Es Directiva / Programador
                    window.location.href = 'admin.html';
                } else {
                    // Es Vecino - Preparamos datos para la vista del Marbete/Status
                    alert(`¡Bienvenido, ${usuarioValido.nombre}! Abriendo Estatus...`);
                    // Al ser un prototipo web, podemos redirigir al marbete u otra pantalla
                    // window.location.href = 'estatus_vecino.html';
                }
            } else {
                // Mostrar error
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
