<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marbete Digital - DELCO II</title>
    <!-- Integración de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS Nativo con diseño Premium (Glassmorphism, Dark Mode) -->
    <style>
        :root {
            --primary-color: #3b82f6;
            /* Blue 500 */
            --primary-hover: #2563eb;
            /* Blue 600 */
            --bg-gradient-start: #0f172a;
            /* Slate 900 */
            --bg-gradient-end: #1e293b;
            /* Slate 800 */
            --text-main: #f8fafc;
            /* Slate 50 */
            --text-muted: #94a3b8;
            /* Slate 400 */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-circle {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            background: linear-gradient(135deg, var(--primary-color), #60a5fa);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            color: white;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-lote {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        .input-lote:focus {
            border-color: var(--primary-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            outline: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3), 0 2px 4px -2px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4), 0 4px 6px -4px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .footer-link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .footer-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="glass-panel">
            <div id="loginSection">
                <div class="header">
                    <div class="logo-circle">
                        <!-- Glow effect around icon -->
                        <div
                            style="position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px var(--primary-color); opacity: 0.6; pointer-events: none;">
                        </div>
                        <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg" style="position: relative; z-index: 1;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                            </path>
                        </svg>
                    </div>
                    <h1 class="title" id="condoTitle">CONDOMINIO X</h1>
                    <p class="subtitle">Control de Acceso y Marbetes Digitales</p>
                </div>

                <div class="action-buttons">
                    <form id="entryForm" onsubmit="validarAcceso(event)">
                        <input type="text" id="codigoInput" class="input-lote" placeholder="CÓDIGO DE ACCESO"
                            style="text-transform: uppercase; font-weight: 700; letter-spacing: 2px; margin-bottom: 1.5rem;"
                            required />

                        <button type="submit" class="btn btn-primary">
                            Ingresar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Panel de Opciones para el Vecino (Se muestra tras validar) -->
            <div id="neighborMenu" style="display: none;">
                <div class="header">
                    <div class="logo-circle">
                        <div
                            style="position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px var(--primary-color); opacity: 0.6; pointer-events: none;">
                        </div>
                        <svg class="logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg" style="position: relative; z-index: 1;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z">
                            </path>
                        </svg>
                    </div>
                    <h1 class="title" id="condoTitleMenu">CONDOMINIO X</h1>
                    <p class="subtitle">Control de Acceso y Marbetes Digitales</p>
                </div>

                <div id="saludoVecino"
                    style="font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 2rem; color: var(--primary-color); letter-spacing: 0.5px;">
                </div>

                <div class="action-buttons">
                    <button onclick="irAMarbete()" class="btn btn-primary">
                        Generar Marbete (QR)
                    </button>

                    <button onclick="irAVisitas()" class="btn btn-secondary"
                        style="background-color: rgba(255,255,255,0.08); color: white;">
                        Escanear / Ver Visitas
                    </button>

                    <button onclick="cerrarSesionVecino()" class="btn"
                        style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); background: none;">
                        ← Salir / Cambiar Código
                    </button>
                </div>
            </div>

            <div class="footer">
                <a href="login.html" class="footer-link">Acceso a Directiva / Panel Principal</a>
                <p class="footer-text" id="footerText">&copy; 2026 Gestión de Accesos</p>
            </div>
        </div>
    </div>

    <script>
        // Cargar configuración inicial
        const config_db = JSON.parse(localStorage.getItem('delco_config')) || { nombre: 'DELCO II' };
        const sistemaConfigurado = config_db.setup_complete === true;

        document.title = `Acceso - ${config_db.nombre}`;
        const titulos = [document.getElementById('condoTitle'), document.getElementById('condoTitleMenu')];
        titulos.forEach(t => { if (t) t.innerText = config_db.nombre.toUpperCase(); });
        document.getElementById('footerText').innerHTML = `&copy; 2026 Gestión de Accesos - ${config_db.nombre}`;

        // Si hay un logo configurado
        if (config_db.logo) {
            document.querySelectorAll('.logo-circle').forEach(div => {
                div.innerHTML = `<img src="${config_db.logo}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%; box-shadow: 0 0 15px rgba(59,130,246,0.5);">`;
            });
        }

        let codigoValidado = "";

        // --- SISTEMA DE LICENCIAS MAESTRAS ---
        const LICENCIAS_MAESTRAS = {
            "7777": "CONDOMINIO X",
            "1234": "CONDOMINIO EL CIELO",
            "5555": "RESIDENCIAL ESMERALDA",
            "8888": "CONDOMINIO EL VALLE"
        };
        // -------------------------------------

        function validarAcceso(e) {
            if (e) e.preventDefault();
            const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();

            // --- LÓGICA DE LICENCIA POR NÚMERO ---
            if (LICENCIAS_MAESTRAS[codigo]) {
                if (sistemaConfigurado) {
                    alert("❌ Esta licencia ya no es válida para reactivación.");
                    return;
                }
                const nuevoNombre = LICENCIAS_MAESTRAS[codigo];
                if (confirm(`🔑 LICENCIA VÁLIDA: ${codigo}\n\nSe actualizará el Condominio a: "${nuevoNombre}"\n✅ LOS VECINOS Y REGISTROS SE MANTENDRÁN.\n\n¿Desea continuar?`)) {

                    // Actualizamos solo la configuración
                    const config = JSON.parse(localStorage.getItem('delco_config')) || {};
                    config.nombre = nuevoNombre;
                    config.nombreMarbete = nuevoNombre;
                    config.setup_complete = true;
                    localStorage.setItem('delco_config', JSON.stringify(config));

                    // Aseguramos usuarios maestros
                    let usuarios = JSON.parse(localStorage.getItem('delco_usuarios')) || [];
                    if (!usuarios.find(u => u.username === 'DIRECTIVA')) {
                        usuarios.push({ username: 'DIRECTIVA', password_hash: 'M2026', rol_id: 1, nombre: 'ADMINISTRADOR' });
                    }
                    localStorage.setItem('delco_usuarios', JSON.stringify(usuarios));

                    alert(`✅ SISTEMA ACTIVADO EXITOSAMENTE\n\nCondominio: ${nuevoNombre}`);
                    localStorage.setItem('admin_logged_in', 'true');
                    window.location.href = 'modulos_ocultos/admin.html';
                    return;
                }
            }

            if (!codigo) {
                alert("Por favor, ingrese un código de acceso válido.");
                return;
            }

            const usuarios_db = JSON.parse(localStorage.getItem('delco_usuarios')) || [
                { username: 'DIRECTIVA', rol_id: 1, nombre: 'DIRECTIVA' },
                { username: 'GARITA', rol_id: 3, nombre: 'GARITA' }
            ];

            const usuario = usuarios_db.find(u => u.username.toUpperCase() === codigo);

            if (usuario) {
                if (usuario.rol_id === 1) {
                    localStorage.setItem('admin_logged_in', 'true');
                    window.location.href = 'modulos_ocultos/admin.html';
                } else if (usuario.rol_id === 3) {
                    window.location.href = 'garita.html';
                } else {
                    // Es VECINO: Mostrar Menú
                    codigoValidado = codigo;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('neighborMenu').style.display = 'block';
                    document.getElementById('saludoVecino').innerText = `¡Bienvenido, ${usuario.nombre.split(' ')[0]}!`;
                }
            } else {
                alert("Código no reconocido. Por favor verifique sus datos.");
            }
        }

        function irAMarbete() {
            window.location.href = `marbete.html?codigo=${encodeURIComponent(codigoValidado)}`;
        }

        function irAVisitas() {
            window.location.href = `modulos_ocultos/visitas.html?codigo=${encodeURIComponent(codigoValidado)}`;
        }

        function cerrarSesionVecino() {
            location.reload();
        }
    </script>

</body>

</html>
